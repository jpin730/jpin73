<!DOCTYPE html>
<html lang="en">

<head>

  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

<body class="bg-light">

  <header class="bg-dark fixed-top shadow">
    <nav class="container navbar navbar-expand-lg navbar-dark bg-dark px-0">
      <a class="navbar-brand" href="#">
        <img src="img/logo.svg" alt="Jaime Pineda Logo" width="45" height="35" loading="lazy" class="rounded"

      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"

        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a class="nav-link" href="#projects">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#career">Career</a>
          </li>
          <li class="nav-item">

        </ul>

  <section id="hero" class="d-flex align-items-center">
    <div class="container bg-white border rounded shadow overflow-hidden p-4">
      <div class="d-flex align-items-center flex-column justify-content-center">

  <section id="projects">
    <div class="container px-0">
      <h2 class="alt-font text-sec uppercase">Projects</h2>
      <hr class="mt-0 border-sec">

  </section>

  <section id="career">
    <div class="container px-0">
      <h2 class="alt-font text-sec uppercase">Career</h2>
      <hr class="mt-0 border-sec">

  <section id="contact-me" class="bg-sec text-light">
    <div class="container px-0">
      <h2 class="alt-font text-light uppercase">Contact Me</h2>
      <hr class="mt-0 border-light">
    </div>

  <footer class="bg-dark py-3">
    <div class="container px-0">
      <p class="text-light text-center mx-auto my-0">Jaime Pineda &copy; 2020</p>
    </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx"
    crossorigin="anonymous"></script>
  <script>
    $('.nav-link').on('click', function () {
      $('.navbar-collapse').collapse('hide');
